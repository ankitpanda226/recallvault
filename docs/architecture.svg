<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820" font-family="JetBrains Mono, IBM Plex Mono, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d4ff3a"/>
    </marker>
    <marker id="arrowMute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a828f"/>
    </marker>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <rect width="1200" height="820" fill="#0b0d10"/>
  <rect width="1200" height="820" fill="url(#grid)"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e6e8ec" letter-spacing="2">
    <tspan fill="#d4ff3a">RECALL</tspan><tspan>VAULT</tspan>
  </text>
  <text x="40" y="70" font-size="11" fill="#7a828f" letter-spacing="3">ARCHITECTURE · VERIFIED LOCAL-FIRST PERSISTENT MEMORY</text>

  <!-- === Client layer === -->
  <g>
    <rect x="40" y="100" width="1120" height="60" fill="none" stroke="#1d222b" stroke-dasharray="3,4"/>
    <text x="52" y="122" font-size="10" fill="#7a828f" letter-spacing="2">CLIENT</text>
    <rect x="490" y="115" width="220" height="34" fill="#11141a" stroke="#1d222b"/>
    <text x="600" y="137" font-size="12" fill="#e6e8ec" text-anchor="middle">React + Tailwind UI</text>
    <text x="600" y="153" font-size="9" fill="#7a828f" text-anchor="middle">chat · inspector · selector</text>
  </g>

  <!-- === API layer === -->
  <g>
    <rect x="40" y="180" width="1120" height="80" fill="none" stroke="#1d222b" stroke-dasharray="3,4"/>
    <text x="52" y="202" font-size="10" fill="#7a828f" letter-spacing="2">API (FASTAPI)</text>
    <g font-size="11" fill="#e6e8ec">
      <rect x="130"  y="215" width="160" height="34" fill="#11141a" stroke="#1d222b"/>
      <text x="210" y="237" text-anchor="middle">/chat/*</text>
      <rect x="310"  y="215" width="160" height="34" fill="#11141a" stroke="#1d222b"/>
      <text x="390" y="237" text-anchor="middle">/memory/*</text>
      <rect x="490"  y="215" width="160" height="34" fill="#11141a" stroke="#1d222b"/>
      <text x="570" y="237" text-anchor="middle">/projects/*</text>
      <rect x="670"  y="215" width="160" height="34" fill="#11141a" stroke="#1d222b"/>
      <text x="750" y="237" text-anchor="middle">/admin/*</text>
      <rect x="910"  y="215" width="160" height="34" fill="#11141a" stroke="#1d222b"/>
      <text x="990" y="237" text-anchor="middle">/health</text>
    </g>
  </g>

  <!-- === Two pipelines === -->

  <!-- Ingestion pipeline (left) -->
  <g>
    <rect x="40" y="285" width="540" height="360" fill="none" stroke="#1d222b"/>
    <text x="52" y="307" font-size="10" fill="#d4ff3a" letter-spacing="2">INGESTION PIPELINE</text>

    <g font-size="11" fill="#e6e8ec">
      <g>
        <rect x="70" y="325" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="170" y="346" text-anchor="middle">normalize</text>
      </g>
      <g>
        <rect x="350" y="325" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="450" y="346" text-anchor="middle">chunk (sentence-aware)</text>
      </g>
      <g>
        <rect x="70" y="380" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="170" y="401" text-anchor="middle">store raw chunk</text>
      </g>
      <g>
        <rect x="350" y="380" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="450" y="401" text-anchor="middle">embed (MiniLM)</text>
      </g>
      <g>
        <rect x="70" y="435" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="170" y="456" text-anchor="middle">extract candidate facts</text>
      </g>
      <g>
        <rect x="350" y="435" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="450" y="456" text-anchor="middle">verify (policy + floor)</text>
      </g>
      <g>
        <rect x="70" y="490" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="170" y="511" text-anchor="middle">resolve conflict</text>
      </g>
      <g>
        <rect x="350" y="490" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="450" y="511" text-anchor="middle">persist fact (versioned)</text>
      </g>
      <g>
        <rect x="70" y="545" width="480" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="310" y="566" text-anchor="middle">log memory_event (audit trail)</text>
      </g>
    </g>

    <!-- arrows -->
    <g stroke="#d4ff3a" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
      <path d="M270 341 L350 341"/>
      <path d="M450 357 L450 380"/>
      <path d="M350 396 L270 396"/>
      <path d="M170 412 L170 435"/>
      <path d="M270 451 L350 451"/>
      <path d="M450 467 L450 490"/>
      <path d="M350 506 L270 506"/>
      <path d="M170 522 L170 545"/>
    </g>

    <text x="52" y="615" font-size="9" fill="#7a828f">Each step emits a typed event. Every verified fact carries source_chunk_id.</text>
  </g>

  <!-- Retrieval pipeline (right) -->
  <g>
    <rect x="620" y="285" width="540" height="360" fill="none" stroke="#1d222b"/>
    <text x="632" y="307" font-size="10" fill="#d4ff3a" letter-spacing="2">RETRIEVAL PIPELINE</text>

    <g font-size="11" fill="#e6e8ec">
      <g>
        <rect x="650" y="325" width="230" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="765" y="346" text-anchor="middle">query → key aliases</text>
      </g>
      <g>
        <rect x="930" y="325" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="1030" y="346" text-anchor="middle">structured fact lookup</text>
      </g>
      <g>
        <rect x="650" y="380" width="230" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="765" y="401" text-anchor="middle">semantic top-K (Chroma)</text>
      </g>
      <g>
        <rect x="930" y="380" width="200" height="32" fill="#11141a" stroke="#1d222b"/>
        <text x="1030" y="401" text-anchor="middle">rerank (score blend)</text>
      </g>
      <g>
        <rect x="650" y="440" width="480" height="52" fill="#11141a" stroke="#d4ff3a" stroke-width="1.5"/>
        <text x="890" y="462" text-anchor="middle" fill="#d4ff3a" font-weight="700">RESPONSE GUARD</text>
        <text x="890" y="480" text-anchor="middle" fill="#7a828f" font-size="10">verified · cautious · abstain</text>
      </g>
      <g>
        <rect x="650" y="510" width="155" height="38" fill="#11141a" stroke="#6ee7a3"/>
        <text x="727" y="527" text-anchor="middle" fill="#6ee7a3" font-size="10" letter-spacing="2">VERIFIED</text>
        <text x="727" y="541" text-anchor="middle" fill="#7a828f" font-size="9">w/ provenance</text>
      </g>
      <g>
        <rect x="812" y="510" width="155" height="38" fill="#11141a" stroke="#f4c77b"/>
        <text x="889" y="527" text-anchor="middle" fill="#f4c77b" font-size="10" letter-spacing="2">CAUTIOUS</text>
        <text x="889" y="541" text-anchor="middle" fill="#7a828f" font-size="9">hedged</text>
      </g>
      <g>
        <rect x="974" y="510" width="155" height="38" fill="#11141a" stroke="#f28b82"/>
        <text x="1051" y="527" text-anchor="middle" fill="#f28b82" font-size="10" letter-spacing="2">ABSTAIN</text>
        <text x="1051" y="541" text-anchor="middle" fill="#7a828f" font-size="9">no guess</text>
      </g>
    </g>

    <g stroke="#d4ff3a" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
      <path d="M880 341 L930 341"/>
      <path d="M1030 357 L1030 380"/>
      <path d="M930 396 L880 396"/>
      <path d="M765 412 L890 440"/>
      <path d="M1030 412 L890 440"/>
      <path d="M727 492 L727 510"/>
      <path d="M889 492 L889 510"/>
      <path d="M1051 492 L1051 510"/>
    </g>

    <text x="632" y="615" font-size="9" fill="#7a828f">The guard never emits a confident answer without a source_chunk_id trail.</text>
  </g>

  <!-- Connect API to pipelines -->
  <g stroke="#7a828f" stroke-width="1.2" fill="none" marker-end="url(#arrowMute)" stroke-dasharray="4,3">
    <path d="M210 249 L170 325"/>
    <path d="M390 249 L200 325"/>
    <path d="M210 249 L680 325"/>
  </g>

  <!-- === Storage === -->
  <g>
    <rect x="40" y="670" width="1120" height="130" fill="none" stroke="#1d222b"/>
    <text x="52" y="692" font-size="10" fill="#d4ff3a" letter-spacing="2">PER-PROJECT ISOLATED STORAGE · data/{project_id}/</text>

    <g font-size="11" fill="#e6e8ec">
      <g>
        <rect x="90" y="710" width="300" height="70" fill="#11141a" stroke="#1d222b"/>
        <text x="240" y="732" text-anchor="middle" font-weight="700">facts.db (SQLite)</text>
        <text x="240" y="750" text-anchor="middle" fill="#7a828f" font-size="9">memory_chunks · memory_facts</text>
        <text x="240" y="764" text-anchor="middle" fill="#7a828f" font-size="9">memory_conflicts · memory_events</text>
      </g>
      <g>
        <rect x="450" y="710" width="300" height="70" fill="#11141a" stroke="#1d222b"/>
        <text x="600" y="732" text-anchor="middle" font-weight="700">vector_store/ (ChromaDB)</text>
        <text x="600" y="750" text-anchor="middle" fill="#7a828f" font-size="9">persistent HNSW index</text>
        <text x="600" y="764" text-anchor="middle" fill="#7a828f" font-size="9">per-project collection</text>
      </g>
      <g>
        <rect x="810" y="710" width="300" height="70" fill="#11141a" stroke="#1d222b"/>
        <text x="960" y="732" text-anchor="middle" font-weight="700">raw_archives/</text>
        <text x="960" y="750" text-anchor="middle" fill="#7a828f" font-size="9">JSONL verbatim logs</text>
        <text x="960" y="764" text-anchor="middle" fill="#7a828f" font-size="9">audit + portability</text>
      </g>
    </g>
  </g>
</svg>
